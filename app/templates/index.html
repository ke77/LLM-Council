<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Council</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="pre-chat">

  <div id="chat"><div id="chat-inner"></div></div>

  <div id="composer">
    <div id="greeting">
      <h1>LLM Council</h1>
      <p>Describe an idea. A council of AI models will independently review it, critique each other, and hand you a final verdict.</p>
    </div>

    <div id="input-wrap">
      <div id="roles-panel">
        <button id="roles-toggle" type="button">Council roles ▾</button>
        <div id="roles-dropdown" class="hidden">
          <p class="roles-hint">Choose who reviews your idea. Defaults are picked for general use.</p>
          <div id="roles-list"><!-- populated by chat.js from /roles --></div>
        </div>
      </div>
      <div id="message-row">
        <textarea id="idea-input" rows="1" placeholder="Describe your idea..."></textarea>
        <button id="send-btn" title="Send">&uarr;</button>
      </div>
      <div class="hint">Press Enter to send &middot; Shift+Enter for a new line</div>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
